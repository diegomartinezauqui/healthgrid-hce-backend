basePath: /
definitions:
  models.AdminCreateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      role_id:
        minimum: 1
        type: integer
    required:
    - email
    - first_name
    - last_name
    - role_id
    type: object
  models.AssignLocationRequest:
    properties:
      location_id:
        example: 1
        type: integer
    required:
    - location_id
    type: object
  models.AssignPermissionToRoleRequest:
    properties:
      permission_id:
        type: integer
    required:
    - permission_id
    type: object
  models.AssignRoleRequest:
    properties:
      role_id:
        example: 1
        type: integer
    required:
    - role_id
    type: object
  models.AssignSpecialityRequest:
    properties:
      speciality_id:
        example: 1
        type: integer
    required:
    - speciality_id
    type: object
  models.AuthResponse:
    properties:
      token:
        type: string
      user:
        $ref: '#/definitions/models.User'
    type: object
  models.BindRabbitQueueRequest:
    properties:
      event_id:
        example: 1
        type: integer
      queue_name:
        example: billing.requests
        type: string
    required:
    - event_id
    - queue_name
    type: object
  models.ChangePasswordRequest:
    properties:
      current_password:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - current_password
    - new_password
    type: object
  models.CreateEventLogRequest:
    properties:
      event_type_id:
        type: integer
      payload:
        type: string
      publisher_module:
        type: string
    required:
    - event_type_id
    - publisher_module
    type: object
  models.CreateEventSubscriptionRequest:
    properties:
      endpoint_url:
        type: string
      event_type_id:
        type: integer
      subscriber_module:
        type: string
    required:
    - endpoint_url
    - event_type_id
    - subscriber_module
    type: object
  models.CreateEventTypeRequest:
    properties:
      description:
        type: string
      name:
        type: string
      source_module:
        type: string
    required:
    - name
    - source_module
    type: object
  models.CreateLocationRequest:
    properties:
      address:
        type: string
      city:
        type: string
      country:
        type: string
      name:
        type: string
    required:
    - address
    - city
    - country
    - name
    type: object
  models.CreatePermissionRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  models.CreateRabbitQueueRequest:
    properties:
      queue_name:
        example: billing
        type: string
      queue_type:
        enum:
        - requests
        - responses
        example: requests
        type: string
    required:
    - queue_name
    - queue_type
    type: object
  models.CreateRoleRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  models.CreateSpecialityRequest:
    properties:
      name:
        type: string
    required:
    - name
    type: object
  models.CreateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    type: object
  models.ErrorResponse:
    properties:
      error:
        type: string
    type: object
  models.EventLog:
    properties:
      created_at:
        type: string
      event_type:
        $ref: '#/definitions/models.EventType'
      event_type_id:
        type: integer
      id:
        type: integer
      payload:
        type: string
      publisher_module:
        type: string
      status:
        description: pending, delivered, failed
        type: string
    type: object
  models.EventLogListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.EventLog'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.EventSubscription:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      endpoint_url:
        type: string
      event_type:
        $ref: '#/definitions/models.EventType'
      event_type_id:
        type: integer
      id:
        type: integer
      is_active:
        type: boolean
      subscriber_module:
        type: string
    type: object
  models.EventSubscriptionListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.EventSubscription'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.EventType:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      source_module:
        type: string
    type: object
  models.EventTypeListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.EventType'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.ForgotPasswordRequest:
    properties:
      email:
        type: string
    required:
    - email
    type: object
  models.JWK:
    properties:
      alg:
        type: string
      e:
        type: string
      kid:
        type: string
      kty:
        type: string
      "n":
        type: string
      use:
        type: string
    type: object
  models.JWKS:
    properties:
      keys:
        items:
          $ref: '#/definitions/models.JWK'
        type: array
    type: object
  models.Location:
    properties:
      address:
        type: string
      city:
        type: string
      country:
        type: string
      created_at:
        type: string
      deleted_at:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  models.LocationListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Location'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  models.MessageResponse:
    properties:
      message:
        type: string
    type: object
  models.Pagination:
    properties:
      page:
        type: integer
      pageSize:
        type: integer
    type: object
  models.Permission:
    properties:
      deleted_at:
        type: string
      id:
        type: integer
      name:
        type: string
      roles:
        items:
          $ref: '#/definitions/models.Role'
        type: array
    type: object
  models.PermissionListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Permission'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.RabbitQueueBindingResponse:
    properties:
      event_id:
        type: integer
      exchange:
        type: string
      queue_name:
        type: string
      rabbit_username:
        type: string
      routing_key:
        type: string
    type: object
  models.RabbitQueueResponse:
    properties:
      dlq_name:
        type: string
      queue_name:
        type: string
      queue_type:
        type: string
      rabbit_username:
        type: string
    type: object
  models.ResetPasswordRequest:
    properties:
      code:
        type: string
      email:
        type: string
      new_password:
        minLength: 6
        type: string
    required:
    - code
    - email
    - new_password
    type: object
  models.Role:
    properties:
      deleted_at:
        type: string
      id:
        type: integer
      name:
        type: string
      permissions:
        items:
          $ref: '#/definitions/models.Permission'
        type: array
      users:
        items:
          $ref: '#/definitions/models.User'
        type: array
    type: object
  models.RoleListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Role'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.SSOExchangeRequest:
    properties:
      ticket:
        type: string
    required:
    - ticket
    type: object
  models.SSOTicketResponse:
    properties:
      expires_in:
        type: integer
      ticket:
        type: string
    type: object
  models.Speciality:
    properties:
      deleted_at:
        type: string
      id:
        type: integer
      name:
        type: string
    type: object
  models.SpecialityListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.Speciality'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.UpdateEventLogStatusRequest:
    properties:
      status:
        description: 'Status must be one of: pending, delivered, failed'
        enum:
        - pending
        - delivered
        - failed
        example: delivered
        type: string
    required:
    - status
    type: object
  models.UpdateEventSubscriptionRequest:
    properties:
      endpoint_url:
        type: string
      is_active:
        type: boolean
    type: object
  models.UpdateEventTypeRequest:
    properties:
      description:
        type: string
      name:
        type: string
      source_module:
        type: string
    type: object
  models.UpdateLocationRequest:
    properties:
      address:
        type: string
      city:
        type: string
      country:
        type: string
      name:
        type: string
    type: object
  models.UpdatePermissionRequest:
    properties:
      name:
        type: string
    type: object
  models.UpdateRoleRequest:
    properties:
      name:
        type: string
    type: object
  models.UpdateSpecialityRequest:
    properties:
      name:
        type: string
    type: object
  models.UpdateUserRequest:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
    type: object
  models.User:
    properties:
      created_at:
        type: string
      deleted_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      has_credentials:
        type: boolean
      id:
        type: integer
      last_name:
        type: string
      locations:
        items:
          $ref: '#/definitions/models.Location'
        type: array
      roles:
        items:
          $ref: '#/definitions/models.Role'
        type: array
      specialities:
        items:
          $ref: '#/definitions/models.Speciality'
        type: array
      updated_at:
        type: string
    type: object
  models.UserListResponse:
    properties:
      data:
        items:
          $ref: '#/definitions/models.User'
        type: array
      pagination:
        $ref: '#/definitions/models.Pagination'
      total:
        type: integer
    type: object
  models.ValidateTokenResponse:
    properties:
      user_id:
        type: integer
      valid:
        type: boolean
    type: object
  models.VerifyAccountRequest:
    properties:
      password:
        minLength: 6
        type: string
      token:
        type: string
    required:
    - password
    - token
    type: object
host: api.healthcare.cantero.ar
info:
  contact: {}
  description: API principal del sistema. Gestiona autenticación, usuarios, roles,
    permisos, especialidades, locaciones y eventos.
  title: Core API
  version: 1.0.0
paths:
  /.well-known/jwks.json:
    get:
      description: Returns the JSON Web Key Set (JWKS) for verifying JWT signatures
        issued by this service. Used by other services to validate tokens without
        contacting this API.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.JWKS'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: JWKS
      tags:
      - Auth
  /auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Sends a one-time password reset code to the user's email address.
      parameters:
      - description: Email address
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset code sent to email
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid email format
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: No user found with that email
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Request password reset
      tags:
      - Auth
  /auth/login:
    post:
      consumes:
      - application/json
      description: Authenticates a user with email and password. Returns a JWT token
        and user data.
      parameters:
      - description: Login credentials
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Invalid credentials
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Login
      tags:
      - Auth
  /auth/logout:
    post:
      description: Invalidates the current JWT token. Requires a valid Bearer token
        in the Authorization header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Missing or malformed Authorization header
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - Bearer: []
      summary: Logout
      tags:
      - Auth
  /auth/refresh:
    post:
      description: Issues a new JWT token using the current (still valid) token. Requires
        a valid Bearer token in the Authorization header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Missing or malformed Authorization header
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - Bearer: []
      summary: Refresh token
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with email and password. Returns a JWT
        token and user data.
      parameters:
      - description: Registration data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Invalid request or email already exists
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Register
      tags:
      - Auth
  /auth/reset-password:
    post:
      consumes:
      - application/json
      description: Resets the user's password using the code sent via email. The code
        expires after a limited time.
      parameters:
      - description: Reset data (email, code, new password)
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password changed successfully
          schema:
            $ref: '#/definitions/models.MessageResponse'
        "400":
          description: Invalid or expired code, or password does not meet requirements
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: No user found with that email
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Reset password
      tags:
      - Auth
  /auth/sso-exchange:
    post:
      consumes:
      - application/json
      description: Redeems a single-use SSO ticket for a fresh JWT and user data.
        Called server-to-server by the destination module's backend after receiving
        the ticket via redirect. The ticket is consumed on first use and cannot be
        reused.
      parameters:
      - description: SSO ticket
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.SSOExchangeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Invalid, used or expired ticket
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Exchange SSO ticket
      tags:
      - Auth
  /auth/sso-ticket:
    post:
      description: Issues a short-lived, single-use SSO ticket for the authenticated
        user. The frontend redirects the browser to another module (on a different
        domain) with this ticket, and that module's backend redeems it via /auth/sso-exchange
        for a fresh JWT. The ticket expires in seconds and can be used only once.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.SSOTicketResponse'
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - Bearer: []
      summary: Create SSO ticket
      tags:
      - Auth
  /auth/validate:
    get:
      description: Verifies whether a JWT token is valid and returns the associated
        user ID. Requires a valid Bearer token in the Authorization header.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.ValidateTokenResponse'
        "400":
          description: Missing or malformed Authorization header
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Invalid or expired token
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - Bearer: []
      summary: Validate token
      tags:
      - Auth
  /auth/verify-account:
    post:
      consumes:
      - application/json
      description: Activates an account created by an admin. The user sets their password
        using the token received by email and receives a JWT token to start their
        session immediately.
      parameters:
      - description: Verification token and chosen password
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.VerifyAccountRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.AuthResponse'
        "400":
          description: Token invalid, already used, or expired
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      summary: Verify account
      tags:
      - Auth
  /events/log:
    get:
      description: 'Returns a paginated audit log of all published events. Optionally
        filter by event_type_id or publisher_module. Requires permission: `events:log:read`'
      parameters:
      - default: 1
        description: 'Page number (default: 1)'
        in: query
        minimum: 1
        name: page
        type: integer
      - default: 10
        description: 'Items per page (default: 10)'
        in: query
        minimum: 1
        name: pageSize
        type: integer
      - description: Filter by event type ID
        in: query
        name: event_type_id
        type: integer
      - description: Filter by publisher module name
        in: query
        name: publisher_module
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EventLogListResponse'
        "400":
          description: Invalid pagination or filter parameters
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthenticated
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: 'Missing permission: events:log:read'
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - Bearer: []
      summary: List event log
      tags:
      - Events
    post:
      consumes:
      - application/json
      description: 'Publishes an event to the bus. Creates an event log entry with
        status `pending` and notifies all active subscribers. Requires permission:
        `events:log:publish`'
      parameters:
      - description: Event data
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.CreateEventLogRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/models.EventLog'
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthenticated
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: 'Missing permission: events:log:publish'
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - Bearer: []
      summary: Publish event
      tags:
      - Events
  /events/log/{id}:
    get:
      description: 'Returns a single event log entry by ID. Requires permission: `events:log:read`'
      parameters:
      - description: Event log entry ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EventLog'
        "400":
          description: Invalid ID
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthenticated
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: 'Missing permission: events:log:read'
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Event log entry not found
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/models.ErrorResponse'
      security:
      - Bearer: []
      summary: Get event log entry
      tags:
      - Events
  /events/log/{id}/status:
    patch:
      consumes:
      - application/json
      description: 'Updates the delivery status of an event log entry. Used by subscribers
        to report whether the event was delivered successfully. Requires permission:
        `events:log:update-status`'
      parameters:
      - description: Event log entry ID
        in: path
        name: id
        required: true
        type: integer
      - description: New status
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/models.UpdateEventLogStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.EventLog'
        "400":
          description: Invalid ID or status value
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "401":
          description: Unauthenticated
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "403":
          description: 'Missing permission: events:log:update-status'
          schema:
            $ref: '#/definitions/models.ErrorResponse'
        "404":
          description: Event log entry not found
