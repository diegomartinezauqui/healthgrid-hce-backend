version: "3.9"

services:
  # ─── PostgreSQL ───────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: hce-postgres
    environment:
      POSTGRES_USER: hce_user
      POSTGRES_PASSWORD: hce_pass
      POSTGRES_DB: hce_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hce_user -d hce_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Kafka (opcional, descomentar si se necesita) ─────────────
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:7.6.0
  #   container_name: hce-zookeeper
  #   environment:
  #     ZOOKEEPER_CLIENT_PORT: 2181
  #   ports:
  #     - "2181:2181"

  # kafka:
  #   image: confluentinc/cp-kafka:7.6.0
  #   container_name: hce-kafka
  #   depends_on:
  #     - zookeeper
  #   environment:
  #     KAFKA_BROKER_ID: 1
  #     KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
  #     KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
  #     KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
  #   ports:
  #     - "9092:9092"

volumes:
  pgdata:
